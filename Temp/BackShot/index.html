<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Backshot Roulette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=Onest:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>Backshot Roulette Calculator</h1>

    <section class="controls">
      <div class="row">
        <label>Live shells
          <input id="liveInput" type="number" min="0" value="3" />
        </label>
        <label>Blank shells
          <input id="blankInput" type="number" min="0" value="2" />
        </label>
      </div>

      <div class="row">
        <button id="populateBtn">Populate Lineup</button>
        <button id="resetBtn" class="secondary">Reset</button>
      </div>

      <div class="row">
        <button id="fireBtn">Fire (Live)</button>
        <button id="cycleBtn">Cycle (Blank)</button>
        <button id="updateOddsBtn">Update Odds</button>
      </div>

      <div class="row">
        <input id="knowledgePos" type="number" min="1" placeholder="Pos" style="width:70px" />
        <select id="knowledgeType">
          <option value="UNKNOWN">UNKNOWN</option>
          <option value="LIVE">LIVE</option>
          <option value="BLANK">BLANK</option>
        </select>
        <button id="addKnowledgeBtn">Add Knowledge</button>
      </div>
    </section>

    <section class="status">
      <div class="stats">
        <div>
          Live remaining: <span id="liveRemaining" class="red">0</span>
          &nbsp;||&nbsp;
          Blank remaining: <span id="blankRemaining" class="blue">0</span>
        </div>
        <div>
          Live chance: <span id="liveChance">0%</span>
          &nbsp;||&nbsp;
          Blank chance: <span id="blankChance">0%</span>
        </div>
      </div>

      <div class="lineup-wrap">
        <h2>Shell Lineup</h2>
        <div id="lineup" class="lineup"></div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
