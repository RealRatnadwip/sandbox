<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Language Concepts Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chosen Palette: Neon Dark -->
    <!-- Application Structure Plan: The application is structured as a single-page app with a persistent sidebar for navigation and a main content area that dynamically displays information. This was chosen over a linear document to allow users non-linear access to topics, making it ideal for both initial learning and later reference. The structure is thematic: 'Overview', 'Language Evolution', 'Core Concepts', 'Control Structures', and 'Best Practices'. This grouping helps users build a mental model of the C language from high-level concepts down to specific syntax. Interactivity is introduced through clickable navigation, an interactive timeline for language generations, and expandable sections for code examples, reducing cognitive load and encouraging exploration. -->
    <!-- Visualization & Content Choices: 
        - Report Info: 3GL, 4GL, 5GL, etc. -> Goal: Show historical progression. -> Viz/Presentation Method: Interactive horizontal timeline diagram. -> Interaction: Clicking a generation reveals a detailed card. -> Justification: A visual timeline is more intuitive for showing sequence and evolution than a simple text list. -> Library/Method: HTML/CSS (Tailwind)/JS.
        - Report Info: IF/ELSE, FOR, WHILE syntax. -> Goal: Teach syntax clearly. -> Viz/Presentation Method: Styled code blocks. -> Interaction: "Copy Code" button and a toggle to show/hide detailed explanations. -> Justification: Facilitates easy use and study of code snippets without cluttering the UI. -> Library/Method: HTML/CSS/JS.
        - Report Info: All other definitions. -> Goal: Present definitions clearly. -> Viz/Presentation Method: Content cards displayed in the main area. -> Interaction: Swapping content based on nav selection. -> Justification: Organizes information into digestible, self-contained units. -> Library/Method: HTML/CSS/JS.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        :root {
            --bg-main: #121212;
            --bg-secondary: #1E1E1E;
            --text-primary: #F0F0F0;
            --text-secondary: #808080;
            --accent: #E0F11F;
            --accent-hover: #c8d61c;
            --border-color: #2c2c2c;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
        }
        .sidebar-link.active {
            background-color: var(--accent);
            color: #121212;
            font-weight: 600;
        }
        .sidebar-link:hover:not(.active) {
            background-color: var(--border-color);
        }
        .code-block {
            background-color: #111111;
            color: #D4D4D4;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre;
        }
        .code-keyword { color: #569CD6; }
        .code-comment { color: #6A9955; }
        .code-string { color: #CE9178; }
        .code-number { color: #B5CEA8; }
        .code-function { color: #DCDCAA; }
        .timeline-item {
            position: relative;
            padding-bottom: 2.5rem;
        }
        .timeline-dot {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 50%;
            background-color: var(--bg-secondary);
            border: 3px solid var(--accent);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .timeline-dot:hover {
            transform: translateX(-50%) scale(1.2);
        }
        .timeline-line {
            position: absolute;
            top: 15px;
            left: 50%;
            width: 2px;
            height: calc(100% - 15px);
            background-color: var(--border-color);
            transform: translateX(-50%);
        }
        .timeline-item:nth-child(odd) .timeline-content { text-align: right; }
        .timeline-item:nth-child(even) .timeline-content { text-align: left; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#1E1E1E] flex flex-col" id="sidebar">
            <div class="p-6 border-b border-[#2c2c2c]">
                <h1 class="text-2xl font-bold text-[#F0F0F0]">C Language</h1>
                <p class="text-sm text-[#808080]">Concepts Explorer</p>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2">
                <a href="#" data-section="overview" class="sidebar-link flex items-center px-4 py-2 text-[#F0F0F0] rounded-lg transition-colors duration-200 active">
                    <span class="mx-4 font-medium">Overview of C</span>
                </a>
                <a href="#" data-section="evolution" class="sidebar-link flex items-center px-4 py-2 text-[#F0F0F0] rounded-lg transition-colors duration-200">
                    <span class="mx-4 font-medium">Language Evolution</span>
                </a>
                <a href="#" data-section="concepts" class="sidebar-link flex items-center px-4 py-2 text-[#F0F0F0] rounded-lg transition-colors duration-200">
                    <span class="mx-4 font-medium">Core Concepts</span>
                </a>
                <a href="#" data-section="controls" class="sidebar-link flex items-center px-4 py-2 text-[#F0F0F0] rounded-lg transition-colors duration-200">
                    <span class="mx-4 font-medium">Control Structures</span>
                </a>
                <a href="#" data-section="practices" class="sidebar-link flex items-center px-4 py-2 text-[#F0F0F0] rounded-lg transition-colors duration-200">
                    <span class="mx-4 font-medium">Best Practices</span>
                </a>
            </nav>
            <div class="p-4 border-t border-[#2c2c2c] text-center text-xs text-[#808080]">
                <p>&copy; 2025 C Explorer</p>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <div id="content-container" class="max-w-4xl mx-auto">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contentData = {
                overview: {
                    title: "Overview of the C Language",
                    intro: "C is a powerful, general-purpose programming language developed in the early 1970s by Dennis Ritchie at Bell Labs. It's a procedural language known for its efficiency, low-level memory manipulation, and a simple set of keywords, making it a foundational language for system programming, embedded systems, and performance-critical applications.",
                    cards: [
                        {
                            title: "Language Classification",
                            content: "C is classified as a <strong>procedural, compiled, middle-level language</strong>. <ul class='list-disc list-inside mt-2 space-y-2'><li class='mt-2'><strong>Procedural:</strong> Programs are built from procedures, also known as functions or subroutines.</li><li class='mt-2'><strong>Compiled:</strong> Source code is translated into machine code by a compiler before it can be run, resulting in fast execution.</li><li class='mt-2'><strong>Middle-Level:</strong> It bridges the gap between high-level languages (like Python) and low-level languages (like Assembly), providing high-level abstractions while also allowing direct memory access.</li></ul>"
                        }
                    ]
                },
                evolution: {
                    title: "The Evolution of Programming Languages",
                    intro: "Programming languages have evolved through several generations, each representing a step up in abstraction from the computer's underlying hardware. This progression has made programming more accessible, efficient, and powerful for developers. Explore the timeline below to see how languages have developed over time.",
                    timeline: [
                        { gen: "1GL", title: "Machine Language", description: "The most basic, low-level language consisting of binary code (0s and 1s) that a computer's CPU can execute directly. It is machine-dependent and extremely difficult for humans to read or write." },
                        { gen: "2GL", title: "Assembly Language", description: "A low-level language that uses mnemonic codes (like ADD, MOV, JMP) to represent machine-level instructions. An assembler translates it into machine code. It's still machine-dependent but more human-readable than 1GL." },
                        { gen: "3GL", title: "Third-Generation Languages", description: "High-level languages like C, C++, Java, and Fortran. They are machine-independent and use syntax closer to human language. A compiler or interpreter translates the code to machine language, making them more portable and easier to program in." },
                        { gen: "4GL", title: "Fourth-Generation Languages", description: "Designed for specific purposes with a higher level of abstraction than 3GLs. They often focus on database management, report generation, and web development. Examples include SQL (for databases) and MATLAB (for numerical computing)." },
                        { gen: "5GL", title: "Fifth-Generation Languages", description: "Primarily used in artificial intelligence and logic programming. These languages are designed to make the computer solve a problem without the programmer specifying an exact algorithm. Prolog and Mercury are examples." },
                    ]
                },
                concepts: {
                    title: "Core Concepts in C",
                    intro: "Understanding the fundamental building blocks of a C program is essential for writing effective code. This section covers the entry point of a program and how to include external libraries, two concepts you'll encounter in every C application.",
                    cards: [
                        {
                            title: "Header Files",
                            content: "Header files (with a <code>.h</code> extension) contain C function declarations and macro definitions to be shared between several source files. They are included at the start of a C source file using the <code>#include</code> preprocessor directive. This allows you to use functions from the standard library or from your own custom libraries.",
                            code: `<span class="code-comment">// Includes the Standard Input/Output library</span>\n<span class="code-keyword">#include</span> <span class="code-string">&lt;stdio.h&gt;</span>\n\n<span class="code-comment">// Includes the Standard Library (for memory allocation, etc.)</span>\n<span class="code-keyword">#include</span> <span class="code-string">&lt;stdlib.h&gt;</span>`
                        },
                        {
                            title: "The `void main()` Function",
                            content: "The <code>main()</code> function is the mandatory entry point for every C program. Execution starts here. The <code>void</code> keyword indicates that the function does not return any value. While modern C standards prefer <code>int main()</code> which returns an integer status code, <code>void main()</code> is still seen in some older textbooks and compilers.",
                            code: `<span class="code-keyword">void</span> <span class="code-function">main</span>() {\n  <span class="code-comment">// Program execution begins here</span>\n  printf(<span class="code-string">"Hello, World!\\n"</span>);\n}`
                        }
                    ]
                },
                controls: {
                    title: "Control Structures in C",
                    intro: "Control structures are the core of decision-making and repetition in programming. They allow you to direct the flow of your program's execution based on certain conditions or to repeat a block of code multiple times. C provides several powerful constructs for this purpose.",
                    cards: [
                        {
                            title: "IF / ELSE Statement",
                            content: "Used for conditional execution. The <code>if</code> block runs if a condition is true, otherwise the optional <code>else</code> block runs.",
                            code: `<span class="code-keyword">int</span> score = <span class="code-number">85</span>;\n\n<span class="code-keyword">if</span> (score &gt;= <span class="code-number">90</span>) {\n  printf(<span class="code-string">"Grade: A\\n"</span>);\n} <span class="code-keyword">else if</span> (score &gt;= <span class="code-number">80</span>) {\n  printf(<span class="code-string">"Grade: B\\n"</span>);\n} <span class="code-keyword">else</span> {\n  printf(<span class="code-string">"Grade: C or lower\\n"</span>);\n}`
                        },
                        {
                            title: "FOR LOOP",
                            content: "Executes a block of code a specified number of times. It consists of three parts: initialization, condition, and increment/decrement.",
                            code: `<span class="code-comment">// Prints numbers from 0 to 4</span>\n<span class="code-keyword">for</span> (<span class="code-keyword">int</span> i = <span class="code-number">0</span>; i &lt; <span class="code-number">5</span>; i++) {\n  printf(<span class="code-string">"Number: %d\\n"</span>, i);\n}`
                        },
                        {
                            title: "WHILE LOOP",
                            content: "Repeatedly executes a block of code as long as a given condition is true. The condition is checked before each iteration.",
                            code: `<span class="code-keyword">int</span> count = <span class="code-number">0</span>;\n\n<span class="code-comment">// Prints numbers from 0 to 4</span>\n<span class="code-keyword">while</span> (count &lt; <span class="code-number">5</span>) {\n  printf(<span class="code-string">"Count: %d\\n"</span>, count);\n  count++;\n}`
                        }
                    ]
                },
                practices: {
                    title: "Programming Techniques & Best Practices",
                    intro: "Writing code that works is only the first step. Writing code that is clean, readable, efficient, and maintainable is what separates a good programmer from a great one. Adhering to best practices makes your code easier for you and others to understand and debug.",
                    accordions: [
                        { title: "Use Meaningful Names", content: "Choose variable and function names that are descriptive and clearly indicate their purpose. Avoid single-letter names (except for simple loop counters like `i`) or abbreviations that are not obvious." },
                        { title: "Comment Your Code", content: "Write comments to explain complex logic, assumptions, or the 'why' behind a piece of code. Well-commented code is much easier to maintain and debug later." },
                        { title: "Write Modular Code", content: "Break down your program into smaller, single-purpose functions. This improves readability, makes testing easier, and allows for code reuse." },
                        { title: "Manage Memory Carefully", content: "In C, you are responsible for memory management. Always free memory that you allocate with `malloc`, `calloc`, or `realloc` to prevent memory leaks. Initialize pointers to `NULL`." },
                        { title: "Check for Errors", content: "Always check the return values of functions that can fail, such as file operations (`fopen`) or memory allocation (`malloc`), and handle potential errors gracefully." },
                        { title: "Be Consistent", content: "Adopt a consistent coding style for things like indentation, brace placement, and naming conventions. This makes the code base look clean and professional." }
                    ]
                }
            };

            const contentContainer = document.getElementById('content-container');
            const sidebarLinks = document.querySelectorAll('.sidebar-link');

            const renderContent = (sectionKey) => {
                const section = contentData[sectionKey];
                if (!section) return;

                let html = `<div class="space-y-8">`;
                html += `<h2 class="text-4xl font-bold text-[#F0F0F0] border-b-4 border-[#E0F11F] pb-2">${section.title}</h2>`;
                html += `<p class="text-lg text-[#808080]">${section.intro}</p>`;
                
                if (section.cards) {
                    section.cards.forEach(card => {
                        html += `
                            <div class="bg-[#1E1E1E] p-6 rounded-lg border border-[#2c2c2c] transition-all duration-300 hover:border-[#E0F11F]">
                                <h3 class="text-2xl font-semibold text-[#F0F0F0] mb-4">${card.title}</h3>
                                <div class="text-[#808080] leading-relaxed">${card.content.replace(/<strong>/g, '<strong class=\"text-[#F0F0F0]\">').replace(/<code>/g, '<code class=\"text-[#E0F11F] bg-black/50 px-1 rounded\">')}</div>
                                ${card.code ? `
                                    <div class="mt-4 relative">
                                        <div class="code-block">${card.code}</div>
                                        <button class="copy-btn absolute top-2 right-2 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold py-1 px-2 rounded transition-colors duration-200">Copy</button>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                }
                
                if (section.timeline) {
                    html += `<div class="bg-[#1E1E1E] p-6 rounded-lg border border-[#2c2c2c]">`;
                    html += `<div class="relative">`;
                    section.timeline.forEach((item, index) => {
                         html += `
                           <div class="timeline-item flex ${index % 2 === 0 ? 'justify-start' : 'justify-end'}">
                               <div class="w-1/2 ${index % 2 === 0 ? 'pr-8' : 'pl-8'}">
                                   <div class="timeline-content">
                                       <h4 class="font-bold text-[#E0F11F]">${item.gen} - ${item.title}</h4>
                                       <p class="text-sm text-[#808080] mt-1">${item.description}</p>
                                   </div>
                               </div>
                               ${index < section.timeline.length - 1 ? '<div class="timeline-line"></div>' : ''}
                               <div class="timeline-dot"></div>
                           </div>
                         `;
                    });
                    html += `</div></div>`;
                }

                if (section.accordions) {
                    section.accordions.forEach((item, index) => {
                        html += `
                        <div class="bg-[#1E1E1E] rounded-lg border border-[#2c2c2c] overflow-hidden accordion-item">
                            <button class="accordion-header w-full text-left p-4 flex justify-between items-center hover:bg-[#2c2c2c] transition-colors duration-200">
                                <span class="text-lg font-semibold text-[#F0F0F0]">${item.title}</span>
                                <span class="transform transition-transform duration-300">
                                    <svg class="w-6 h-6 text-[#E0F11F]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </span>
                            </button>
                            <div class="accordion-content max-h-0 overflow-hidden transition-all duration-500 ease-in-out">
                                <p class="p-4 pt-0 text-[#808080]">${item.content}</p>
                            </div>
                        </div>
                        `;
                    });
                }

                html += `</div>`;
                contentContainer.innerHTML = html;
                attachEventListeners();
            };

            const attachEventListeners = () => {
                document.querySelectorAll('.copy-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const codeBlock = e.target.previousElementSibling;
                        const codeText = codeBlock.innerText;
                        
                        const textArea = document.createElement('textarea');
                        textArea.value = codeText;
                        document.body.appendChild(textArea);
                        textArea.select();
                        try {
                            document.execCommand('copy');
                            e.target.textContent = 'Copied!';
                            setTimeout(() => { e.target.textContent = 'Copy'; }, 2000);
                        } catch (err) {
                            console.error('Failed to copy text: ', err);
                            e.target.textContent = 'Error';
                        }
                        document.body.removeChild(textArea);
                    });
                });
                
                document.querySelectorAll('.accordion-header').forEach(header => {
                    header.addEventListener('click', () => {
                        const content = header.nextElementSibling;
                        const icon = header.querySelector('svg');

                        if(content.style.maxHeight) {
                            content.style.maxHeight = null;
                            icon.parentElement.classList.remove('rotate-180');
                        } else {
                            content.style.maxHeight = content.scrollHeight + 'px';
                            icon.parentElement.classList.add('rotate-180');
                        }
                    });
                });
            };

            sidebarLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    sidebarLinks.forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    
                    const sectionKey = link.getAttribute('data-section');
                    renderContent(sectionKey);
                });
            });

            // Initial render
            document.querySelector('.sidebar-link[data-section="overview"]').classList.add('active');
            renderContent('overview');
        });
    </script>
</body>
</html>
