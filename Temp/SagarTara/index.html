<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Fold</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&display=swap" rel="stylesheet">
<link rel="preload" href="closed.png" as="image">
<link rel="preload" href="open.png" as="image">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #5c0000;
}

.card {
    position: relative;
}

/* CLOSED → full width */
.card.closed {
    width: 95vw;
    aspect-ratio: 9 / 5;
}

/* OPEN → full height */
.card.open {
    height: 90vh;
    aspect-ratio: 9 / 17;
}

.img {
    position: absolute;
    top: -3%;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.4s ease;
    user-select: none;
    -webkit-user-drag: none;
    -webkit-user-select: none;
}

.closed-img {
    opacity: 1;
}

.open-img {
    opacity: 0;
}

.label {
    position: fixed;
    bottom: 2em;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    text-align: center;
    color: #FFFFFF;
    text-shadow: 2px 2px #7E8287;
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'Big Shoulders', sans-serif;
    transition: color 0.4s ease;
}

.instruction {
    position: fixed;
    top: 2em;
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    text-align: center;
    color: #FFFFFF;
    text-shadow: 2px 2px #7E8287;
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'Big Shoulders', sans-serif;
    transition: color 0.4s ease;
}
</style>
</head>

<body>

<div class="instruction" >Tap Image to see more.</div>

<div class="card closed" id="card">
    <img id="closedImg" src="closed.png" alt="Card" class="img closed-img">
    <img id="openImg" src="open.png" alt="Card" class="img open-img">
</div>

<div class="label" id="label">To: ...</div>

<script>
const card = document.getElementById("card");
const closedImg = document.getElementById("closedImg");
const openImg = document.getElementById("openImg");
const label = document.getElementById("label");

// URL param
const params = new URLSearchParams(window.location.search);
const name = params.get("to") || "You";
if (params.get("to")) {
    label.textContent = "To: " + name;
} else {
    label.style.display = "none";
}

let isOpen = false;

// Disable drag and context menu on images
closedImg.addEventListener('dragstart', (e) => e.preventDefault());
openImg.addEventListener('dragstart', (e) => e.preventDefault());
closedImg.addEventListener('contextmenu', (e) => e.preventDefault());
openImg.addEventListener('contextmenu', (e) => e.preventDefault());

card.addEventListener("click", () => {
    isOpen = !isOpen;

    if (isOpen) {
        card.classList.remove("closed");
        card.classList.add("open");
        closedImg.style.opacity = "0";
        openImg.style.opacity = "1";
        label.style.color = "#FFFFFF";
    } else {
        card.classList.remove("open");
        card.classList.add("closed");
        closedImg.style.opacity = "1";
        openImg.style.opacity = "0";
        label.style.color = "#FFFFFF";
    }
});
</script>

</body>
</html>
