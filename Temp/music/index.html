            <!-- Song Info -->
            <div class="song-info">
                <div class="song-name-container">
                    <h1 id="songName" class="song-name">Select a song to play</h1>
                    <button id="muteBtn" class="mute-btn">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div class="artist-name-container">
                    <p id="artistName" class="artist-name">Unknown Artist</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="prevBtn" class="control-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button id="playPauseBtn" class="control-btn play-pause">
                    <i class="fas fa-play"></i>
                </button>
                <button id="nextBtn" class="control-btn">
                    <i class="fas fa-forward"></i>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                </div>
            </div>

            <!-- Auth Button -->
            <button id="authBtn" class="auth-btn">
                <i class="fab fa-google"></i>
                Connect to Google Drive
            </button>
