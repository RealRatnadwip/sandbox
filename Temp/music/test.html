<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Local Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="player-box">
            <!-- Album Art -->
            <div class="album-art-container">
                <img id="albumArt" src="" alt="Album Art" class="album-art">
                <div class="loading-spinner" id="loadingSpinner">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <div class="song-name-container">
                    <h1 id="songName" class="song-name">Loading...</h1>
                    <button id="muteBtn" class="mute-btn">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div class="artist-name-container">
                    <p id="artistName" class="artist-name">Please wait...</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="prevBtn" class="control-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button id="playPauseBtn" class="control-btn play-pause">
                    <i class="fas fa-play"></i>
                </button>
                <button id="nextBtn" class="control-btn">
                    <i class="fas fa-forward"></i>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                </div>
            </div>

            <!-- Auth Button (Hidden in test mode) -->
            <button id="authBtn" class="auth-btn hidden">
                <i class="fab fa-google"></i>
                Connect to Google Drive
            </button>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer" preload="metadata"></audio>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="testscript.js"></script>
</body>
</html>
